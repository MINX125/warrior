<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saklar Unit - Warrior PS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="bg-[#0b0f1a] text-white font-sans p-4">

    <div class="max-w-lg mx-auto">
        <div class="flex justify-between items-center mb-8 bg-gray-800/50 p-4 rounded-2xl border border-white/5">
            <div>
                <h1 class="text-xl font-black text-blue-500 italic uppercase tracking-tighter leading-none">SAKLAR UNIT</h1>
                <p class="text-[8px] text-gray-500 font-bold uppercase tracking-[0.2em] mt-1">Warrior PS Management</p>
            </div>
            <span class="bg-blue-600/20 text-blue-400 px-3 py-1 rounded-full text-[9px] font-black border border-blue-500/20">11 UNITS ONLINE</span>
        </div>
        
        <div id="unit-controls" class="space-y-4"></div>

        <div class="mt-10 p-4 bg-gray-800/30 rounded-2xl border border-white/5 text-center">
            <p class="text-[9px] text-gray-600 font-black uppercase tracking-widest">Klik tombol untuk update status real-time</p>
        </div>
    </div>

    <script>
        // CONFIG FIREBASE KAMU
        const firebaseConfig = {
            apiKey: "AIzaSyAfPZ6d4nmCfgkV907xNpg1c2ORT_zUhGM",
            authDomain: "warriorps-2f4d9.firebaseapp.com",
            databaseURL: "https://warriorps-2f4d9-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "warriorps-2f4d9",
            storageBucket: "warriorps-2f4d9.firebasestorage.app",
            messagingSenderId: "502639514749",
            appId: "1:502639514749:web:877e45a490bd9d52b7cd14"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const units = [
            { id: 1, type: "TV BESAR" }, { id: 2, type: "TV BESAR" }, { id: 3, type: "TV KECIL" },
            { id: 4, type: "TV KECIL" }, { id: 5, type: "TV KECIL" }, { id: 6, type: "TV BESAR" },
            { id: 7, type: "TV KECIL" }, { id: 8, type: "TV KECIL" }, { id: 9, type: "TV KECIL" },
            { id: 10, type: "TV BESAR" }, { id: 11, type: "TV BESAR" }
        ];

        const container = document.getElementById('unit-controls');

        units.forEach(unit => {
            const div = document.createElement('div');
            div.className = "bg-gray-800/50 p-5 rounded-3xl border border-white/5 flex flex-col gap-4";
            div.innerHTML = `
                <div class="flex justify-between items-center">
                    <div>
                        <span class="font-black text-lg italic uppercase tracking-tighter">Unit ${unit.id}</span>
                        <span id="status-label-${unit.id}" class="ml-2 text-[9px] font-black px-2 py-0.5 rounded border italic uppercase tracking-tighter">...</span>
                    </div>
                    <span class="text-[9px] font-bold text-gray-500 uppercase tracking-widest">${unit.type}</span>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="setStatus(${unit.id}, 'ready')" class="bg-green-600 py-3 rounded-xl text-[10px] font-black">READY</button>
                    <button onclick="setStatus(${unit.id}, 'booked')" class="bg-orange-600 py-3 rounded-xl text-[10px] font-black">BOOKING</button>
                    <button onclick="setStatus(${unit.id}, 'full')" class="bg-red-600 py-3 rounded-xl text-[10px] font-black">FULL</button>
                </div>
            `;
            container.appendChild(div);

            db.ref('warrior_status/unit_' + unit.id).on('value', (snapshot) => {
                const data = snapshot.val();
                const label = document.getElementById(`status-label-${unit.id}`);
                const currentStatus = (data && data.status) ? data.status.toLowerCase() : 'ready';
                
                label.innerText = `(${currentStatus.toUpperCase()})`;
                if (currentStatus === 'ready') {
                    label.className = "ml-2 text-[9px] font-black px-2 py-0.5 rounded bg-green-500/10 text-green-500 border border-green-500/20";
                } else if (currentStatus === 'booked') {
                    label.className = "ml-2 text-[9px] font-black px-2 py-0.5 rounded bg-orange-500/10 text-orange-500 border border-orange-500/20";
                } else {
                    label.className = "ml-2 text-[9px] font-black px-2 py-0.5 rounded bg-red-500/10 text-red-500 border border-red-500/20";
                }
            });
        });

        function setStatus(id, status) {
            db.ref('warrior_status/unit_' + id).update({ status: status });
        }
    </script>
</body>
</html>
