<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Warrior PS Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f1a; color: white; }
        .glass-card { background: rgba(31, 41, 55, 0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="p-4 pb-20">

    <div class="max-w-md mx-auto mb-10 p-6 glass-card rounded-[2rem] border-2 border-blue-500/20 text-center shadow-2xl">
        <h3 class="text-white font-black italic mb-4 uppercase tracking-tighter text-sm">Status Operasional Rental</h3>
        <div class="flex justify-center gap-4">
            <button onclick="setRentalStatus('open')" class="px-6 py-2 rounded-full font-black text-[10px] uppercase border border-green-500 text-green-500 hover:bg-green-500 hover:text-white transition duration-300">OPEN</button>
            <button onclick="setRentalStatus('close')" class="px-6 py-2 rounded-full font-black text-[10px] uppercase border border-red-500 text-red-500 hover:bg-red-500 hover:text-white transition duration-300">CLOSE</button>
        </div>
        <p id="current-status" class="mt-4 text-[9px] font-bold uppercase tracking-widest text-gray-500 italic">Menghubungkan ke server...</p>
    </div>

    <div class="max-w-lg mx-auto">
        <div class="flex justify-between items-center mb-8 glass-card p-5 rounded-3xl">
            <div>
                <h1 class="text-xl font-black text-blue-500 italic uppercase tracking-tighter leading-none">SAKLAR UNIT</h1>
                <p class="text-[8px] text-gray-500 font-bold uppercase tracking-[0.2em] mt-1 italic text-shadow">Warrior PS Management System</p>
            </div>
            <span class="bg-blue-600/20 text-blue-400 px-3 py-1 rounded-full text-[9px] font-black border border-blue-500/20 uppercase">11 Units Online</span>
        </div>
        
        <div id="unit-controls" class="space-y-6">
            </div>

        <div class="mt-12 p-6 glass-card rounded-3xl text-center border-dashed border-gray-700 border-2">
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest italic leading-relaxed">
                Developer Note: Gunakan tombol timer untuk paket durasi,<br>gunakan tombol LOSS untuk main sepuasnya.
            </p>
        </div>
    </div>

    <script>
        // CONFIG FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyAfPZ6d4nmCfgkV907xNpg1c2ORT_zUhGM",
            authDomain: "warriorps-2f4d9.firebaseapp.com",
            databaseURL: "https://warriorps-2f4d9-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "warriorps-2f4d9",
            storageBucket: "warriorps-2f4d9.firebasestorage.app",
            messagingSenderId: "502639514749",
            appId: "1:502639514749:web:877e45a490bd9d52b7cd14"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        // 1. LOGIKA STATUS OPERASIONAL RENTAL
        function setRentalStatus(status) {
            db.ref('status_rental').set(status);
        }

        db.ref('status_rental').on('value', (snapshot) => {
            const status = snapshot.val();
            const textStatus = document.getElementById('current-status');
            if(status === 'open') {
                textStatus.innerText = "Status saat ini: RENTAL BUKA (OPEN)";
                textStatus.className = "mt-4 text-[9px] font-bold uppercase tracking-widest text-green-500 italic";
            } else {
                textStatus.innerText = "Status saat ini: RENTAL TUTUP (CLOSE)";
                textStatus.className = "mt-4 text-[9px] font-bold uppercase tracking-widest text-red-500 italic";
            }
        });

        // 2. RENDER UNIT KONTROL
        const units = [
            { id: 1, type: "TV BESAR" }, { id: 2, type: "TV BESAR" }, { id: 3, type: "TV KECIL" },
            { id: 4, type: "TV KECIL" }, { id: 5, type: "TV KECIL" }, { id: 6, type: "TV BESAR" },
            { id: 7, type: "TV KECIL" }, { id: 8, type: "TV KECIL" }, { id: 9, type: "TV KECIL" },
            { id: 10, type: "TV BESAR" }, { id: 11, type: "TV BESAR" }
        ];

        const container = document.getElementById('unit-controls');

        units.forEach(unit => {
            const div = document.createElement('div');
            div.className = "glass-card p-6 rounded-[2.5rem] flex flex-col gap-5 transition-all duration-300 hover:border-blue-500/30 shadow-xl";
            div.innerHTML = `
                <div class="flex justify-between items-center">
                    <div>
                        <span class="font-black text-xl italic uppercase tracking-tighter">Unit ${unit.id}</span>
                        <span id="status-label-${unit.id}" class="ml-2 text-[9px] font-black px-2 py-0.5 rounded border italic uppercase tracking-tighter">...</span>
                    </div>
                    <span class="text-[9px] font-bold text-gray-600 uppercase tracking-widest border border-gray-700 px-2 py-0.5 rounded-md">${unit.type}</span>
                </div>

                <div class="grid grid-cols-3 gap-2">
                    <button onclick="setStatus(${unit.id}, 'ready')" class="bg-green-600 hover:bg-green-500 py-3 rounded-2xl text-[10px] font-black transition uppercase">Ready</button>
                    <button onclick="setStatus(${unit.id}, 'booked')" class="bg-orange-600 hover:bg-orange-500 py-3 rounded-2xl text-[10px] font-black transition uppercase">Book</button>
                    <button onclick="setStatus(${unit.id}, 'full')" class="bg-red-600 hover:bg-red-500 py-3 rounded-2xl text-[10px] font-black transition uppercase italic shadow-lg">Loss</button>
                </div>

                <div class="mt-2 border-t border-white/5 pt-4">
                    <p class="text-[8px] font-black text-blue-500 uppercase tracking-[0.2em] mb-3 italic">Setting Timer Paket</p>
                    <div class="grid grid-cols-4 gap-2">
                        <button onclick="setTimer(${unit.id}, 30)" class="bg-blue-600/10 border border-blue-500/30 py-2 rounded-xl text-[9px] font-black hover:bg-blue-600 hover:text-white transition italic">30m</button>
                        <button onclick="setTimer(${unit.id}, 60)" class="bg-blue-600/10 border border-blue-500/30 py-2 rounded-xl text-[9px] font-black hover:bg-blue-600 hover:text-white transition italic">60m</button>
                        <button onclick="setTimer(${unit.id}, 90)" class="bg-blue-600/10 border border-blue-500/30 py-2 rounded-xl text-[9px] font-black hover:bg-blue-600 hover:text-white transition italic">90m</button>
                        <button onclick="setTimer(${unit.id}, 120)" class="bg-blue-600/10 border border-blue-500/30 py-2 rounded-xl text-[9px] font-black hover:bg-blue-600 hover:text-white transition italic text-yellow-500">120m</button>
                        <button onclick="setTimer(${unit.id}, 150)" class="bg-blue-600/10 border border-blue-500/30 py-2 rounded-xl text-[9px] font-black hover:bg-blue-600 hover:text-white transition italic text-yellow-500 text-xs">2.5j</button>
                        <button onclick="setTimer(${unit.id}, 180)" class="bg-blue-600/10 border border-blue-500/30 py-2 rounded-xl text-[9px] font-black hover:bg-blue-600 hover:text-white transition italic text-yellow-500 text-xs">3j</button>
                        <button onclick="setTimer(${unit.id}, 210)" class="bg-blue-600/10 border border-blue-500/30 py-2 rounded-xl text-[9px] font-black hover:bg-blue-600 hover:text-white transition italic text-yellow-500 text-xs text-shadow">3.5j</button>
                        <button onclick="setTimer(${unit.id}, 240)" class="bg-blue-600/10 border border-blue-500/30 py-2 rounded-xl text-[9px] font-black hover:bg-blue-600 hover:text-white transition italic text-red-500 text-xs shadow-xl">4 JAM</button>
                    </div>
                </div>
            `;
            container.appendChild(div);

            // Pantau status tiap unit secara real-time di halaman Admin
            db.ref('warrior_status/unit_' + unit.id).on('value', (snapshot) => {
                const data = snapshot.val();
                const label = document.getElementById(`status-label-${unit.id}`);
                const currentStatus = (data && data.status) ? data.status.toLowerCase() : 'ready';
                
                label.innerText = `(${currentStatus.toUpperCase()})`;
                if (currentStatus === 'ready') {
                    label.className = "ml-2 text-[9px] font-black px-2 py-0.5 rounded bg-green-500/10 text-green-500 border border-green-500/20";
                } else if (currentStatus === 'booked') {
                    label.className = "ml-2 text-[9px] font-black px-2 py-0.5 rounded bg-orange-500/10 text-orange-500 border border-orange-500/20";
                } else {
                    label.className = "ml-2 text-[9px] font-black px-2 py-0.5 rounded bg-red-500/10 text-red-500 border border-red-500/20";
                }
            });
        });

        // FUNGSI UPDATE STATUS LOSS
        function setStatus(id, status) {
            db.ref('warrior_status/unit_' + id).update({ 
                status: status,
                startTime: status === 'full' ? new Date().getTime() : null, // Waktu mulai untuk mode LOSS
                endTime: null // Menghapus timer jika manual ganti status
            });
        }

        // FUNGSI UPDATE STATUS PAKET (TIMER)
        function setTimer(id, menit) {
            const now = new Date().getTime();
            const endTime = now + (menit * 60 * 1000);
            
            db.ref('warrior_status/unit_' + id).update({
                status: 'full',
                startTime: null, // Hapus start time karena pakai timer
                endTime: endTime
            });
        }
    </script>
</body>
</html>
